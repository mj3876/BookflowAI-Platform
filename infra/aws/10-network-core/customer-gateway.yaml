AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 10 - Customer Gateway x2 (Azure VNet GW + GCP HA VPN). IP set via Parameter (placeholder until Phase 2 Azure/GCP deploy provides real public IP)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  AzureVpnGatewayIp:
    Type: String
    Default: 0.0.0.0
    Description: Azure VPN Gateway Public IP (Phase 2 )
  AzureBgpAsn:
    Type: Number
    Default: 65001
    Description: Azure VPN Gateway BGP ASN (scripts/azure/2-tasks/deploy-vpn.sh vpnBgpAsn=65001 )
  GcpHaVpnIp:
    Type: String
    Default: 0.0.0.0
    Description: GCP HA VPN peer IP (Phase 2  ·  4 IPs  1 )
  GcpBgpAsn:
    Type: Number
    Default: 64514
    Description: GCP Cloud Router BGP ASN (infra/gcp/20-network-daily/cloud-router.tf gcp_router_asn )

Conditions:
  HasAzureIp: !Not [!Equals [!Ref AzureVpnGatewayIp, '0.0.0.0']]
  HasGcpIp: !Not [!Equals [!Ref GcpHaVpnIp, '0.0.0.0']]

Resources:
  # ─── Azure Customer Gateway ───
  AzureCgw:
    Type: AWS::EC2::CustomerGateway
    Condition: HasAzureIp
    Properties:
      Type: ipsec.1
      IpAddress: !Ref AzureVpnGatewayIp
      BgpAsn: !Ref AzureBgpAsn
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-cgw-azure' }]

  # ─── GCP Customer Gateway ───
  GcpCgw:
    Type: AWS::EC2::CustomerGateway
    Condition: HasGcpIp
    Properties:
      Type: ipsec.1
      IpAddress: !Ref GcpHaVpnIp
      BgpAsn: !Ref GcpBgpAsn
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-cgw-gcp' }]

Outputs:
  AzureCgwId:
    Condition: HasAzureIp
    Value: !Ref AzureCgw
    Export: { Name: !Sub '${ProjectName}-cgw-azure-id' }

  GcpCgwId:
    Condition: HasGcpIp
    Value: !Ref GcpCgw
    Export: { Name: !Sub '${ProjectName}-cgw-gcp-id' }


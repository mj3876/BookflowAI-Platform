AWSTemplateFormatVersion: '2010-09-09'
Description: "BOOKFLOW - Tier 10 - VPC Peering: Sales Data <-> Egress. ECS simulators (Sales Data) -> inventory API External ALB (Egress) test path"
Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  Peering:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !ImportValue { 'Fn::Sub': '${ProjectName}-vpc-sales-data-id' }
      PeerVpcId: !ImportValue { 'Fn::Sub': '${ProjectName}-vpc-egress-id' }
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-peering-sales-data-egress' }]

  RouteSalesDataToEgress:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !ImportValue { 'Fn::Sub': '${ProjectName}-rt-sales-data-private' }
      DestinationCidrBlock: 10.2.0.0/16
      VpcPeeringConnectionId: !Ref Peering

  RouteEgressToSalesData:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !ImportValue { 'Fn::Sub': '${ProjectName}-rt-egress-public' }
      DestinationCidrBlock: 10.1.0.0/16
      VpcPeeringConnectionId: !Ref Peering

Outputs:
  PeeringId:
    Value: !Ref Peering
    Export: { Name: !Sub '${ProjectName}-peering-sales-data-egress-id' }

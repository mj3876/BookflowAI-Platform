AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 10 - Egress VPC (10.2.0.0/16) - DMZ - Public subnets only + IGW
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  AzA:
    Type: String
    Default: ap-northeast-1a
  AzC:
    Type: String
    Default: ap-northeast-1c

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpc-egress' }]

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-egress-igw' }]

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicAz1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.2.1.0/24
      AvailabilityZone: !Ref AzA
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-egress-public-az1' }]

  PublicAz2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.2.2.0/24
      AvailabilityZone: !Ref AzC
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-egress-public-az2' }]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-egress-public-rt' }]

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RtAssocAz1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicAz1, RouteTableId: !Ref RouteTable }

  RtAssocAz2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicAz2, RouteTableId: !Ref RouteTable }

  # ─── Custom NACL (Public subnet ·   ) ───
  Nacl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-egress-nacl' }]

  NaclIngress100:
    Type: AWS::EC2::NetworkAclEntry
    Properties: { NetworkAclId: !Ref Nacl, RuleNumber: 100, Protocol: -1, RuleAction: allow, Egress: false, CidrBlock: 0.0.0.0/0 }

  NaclEgress100:
    Type: AWS::EC2::NetworkAclEntry
    Properties: { NetworkAclId: !Ref Nacl, RuleNumber: 100, Protocol: -1, RuleAction: allow, Egress: true, CidrBlock: 0.0.0.0/0 }

  NaclAssocAz1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref PublicAz1, NetworkAclId: !Ref Nacl }

  NaclAssocAz2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref PublicAz2, NetworkAclId: !Ref Nacl }

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: !Sub '${ProjectName}-vpc-egress-id' }
  Cidr:
    Value: !GetAtt Vpc.CidrBlock
    Export: { Name: !Sub '${ProjectName}-vpc-egress-cidr' }
  IgwId:
    Value: !Ref Igw
    Export: { Name: !Sub '${ProjectName}-egress-igw-id' }
  PublicAz1Id:
    Value: !Ref PublicAz1
    Export: { Name: !Sub '${ProjectName}-subnet-egress-public-az1' }
  PublicAz2Id:
    Value: !Ref PublicAz2
    Export: { Name: !Sub '${ProjectName}-subnet-egress-public-az2' }
  RouteTableId:
    Value: !Ref RouteTable
    Export: { Name: !Sub '${ProjectName}-rt-egress-public' }

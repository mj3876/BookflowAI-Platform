AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 10 - BookFlow AI VPC (10.0.0.0/16) - EKS Pod private only

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  AzA:
    Type: String
    Default: ap-northeast-1a
  AzC:
    Type: String
    Default: ap-northeast-1c

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpc-bookflow-ai' }]

  PrivateAz1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Ref AzA
      MapPublicIpOnLaunch: true   # temp IGW outbound for EKS node build (replace with NAT later)
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-bookflow-ai-private-az1' }]

  PrivateAz2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Ref AzC
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-bookflow-ai-private-az2' }]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-bookflow-ai-private-rt' }]

  # IGW - temp for EKS Nodegroup outbound (replace with NAT later)
  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-bookflow-ai-igw' }]

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  RouteToIgw:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RtAssocAz1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateAz1, RouteTableId: !Ref RouteTable }

  RtAssocAz2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateAz2, RouteTableId: !Ref RouteTable }

  # Custom NACL (override default NACL)
  Nacl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-bookflow-ai-nacl' }]

  NaclIngress100:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Nacl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0

  NaclEgress100:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Nacl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  NaclAssocAz1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref PrivateAz1, NetworkAclId: !Ref Nacl }

  NaclAssocAz2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref PrivateAz2, NetworkAclId: !Ref Nacl }

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: !Sub '${ProjectName}-vpc-bookflow-ai-id' }
  Cidr:
    Value: !GetAtt Vpc.CidrBlock
    Export: { Name: !Sub '${ProjectName}-vpc-bookflow-ai-cidr' }
  PrivateAz1Id:
    Value: !Ref PrivateAz1
    Export: { Name: !Sub '${ProjectName}-subnet-bookflow-ai-private-az1' }
  PrivateAz2Id:
    Value: !Ref PrivateAz2
    Export: { Name: !Sub '${ProjectName}-subnet-bookflow-ai-private-az2' }
  RouteTableId:
    Value: !Ref RouteTable
    Export: { Name: !Sub '${ProjectName}-rt-bookflow-ai-private' }

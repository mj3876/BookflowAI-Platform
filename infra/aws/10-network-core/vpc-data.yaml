AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 10 - Data VPC (10.3.0.0/16) - RDS + Redis isolated; Private + DB subnet
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  AzA:
    Type: String
    Default: ap-northeast-1a
  AzC:
    Type: String
    Default: ap-northeast-1c

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.3.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpc-data' }]

  PrivateAz1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.3.1.0/24
      AvailabilityZone: !Ref AzA
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-private-az1' }]

  PrivateAz2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.3.2.0/24
      AvailabilityZone: !Ref AzC
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-private-az2' }]

  DbAz1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.3.11.0/24
      AvailabilityZone: !Ref AzA
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-db-az1' }]

  DbAz2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.3.12.0/24
      AvailabilityZone: !Ref AzC
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-db-az2' }]

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-private-rt' }]

  DbRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-db-rt' }]

  PrivateRtAssocAz1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateAz1, RouteTableId: !Ref PrivateRouteTable }
  PrivateRtAssocAz2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateAz2, RouteTableId: !Ref PrivateRouteTable }
  DbRtAssocAz1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref DbAz1, RouteTableId: !Ref DbRouteTable }
  DbRtAssocAz2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref DbAz2, RouteTableId: !Ref DbRouteTable }

  # ─── Custom NACL (Private + DB 4 subnet ) ───
  Nacl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-data-nacl' }]

  NaclIngress100:
    Type: AWS::EC2::NetworkAclEntry
    Properties: { NetworkAclId: !Ref Nacl, RuleNumber: 100, Protocol: -1, RuleAction: allow, Egress: false, CidrBlock: 0.0.0.0/0 }

  NaclEgress100:
    Type: AWS::EC2::NetworkAclEntry
    Properties: { NetworkAclId: !Ref Nacl, RuleNumber: 100, Protocol: -1, RuleAction: allow, Egress: true, CidrBlock: 0.0.0.0/0 }

  NaclAssocPrivateAz1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref PrivateAz1, NetworkAclId: !Ref Nacl }
  NaclAssocPrivateAz2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref PrivateAz2, NetworkAclId: !Ref Nacl }
  NaclAssocDbAz1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref DbAz1, NetworkAclId: !Ref Nacl }
  NaclAssocDbAz2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties: { SubnetId: !Ref DbAz2, NetworkAclId: !Ref Nacl }

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: !Sub '${ProjectName}-vpc-data-id' }
  Cidr:
    Value: !GetAtt Vpc.CidrBlock
    Export: { Name: !Sub '${ProjectName}-vpc-data-cidr' }
  PrivateAz1Id:
    Value: !Ref PrivateAz1
    Export: { Name: !Sub '${ProjectName}-subnet-data-private-az1' }
  PrivateAz2Id:
    Value: !Ref PrivateAz2
    Export: { Name: !Sub '${ProjectName}-subnet-data-private-az2' }
  DbAz1Id:
    Value: !Ref DbAz1
    Export: { Name: !Sub '${ProjectName}-subnet-data-db-az1' }
  DbAz2Id:
    Value: !Ref DbAz2
    Export: { Name: !Sub '${ProjectName}-subnet-data-db-az2' }
  PrivateRouteTableId:
    Value: !Ref PrivateRouteTable
    Export: { Name: !Sub '${ProjectName}-rt-data-private' }
  DbRouteTableId:
    Value: !Ref DbRouteTable
    Export: { Name: !Sub '${ProjectName}-rt-data-db' }

AWSTemplateFormatVersion: '2010-09-09'
Description: "BOOKFLOW - Tier 00 - CodeStar Connection for GitHub OAuth (CodePipeline source). Manual activation required in AWS Console (PENDING -> AVAILABLE): deploy stack, then Console > Developer Tools > Connections > Update pending connection > install GitHub App"
Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub ${ProjectName}-github
      ProviderType: GitHub

Outputs:
  ConnectionArn:
    Value: !Ref GitHubConnection
    Export:
      Name: !Sub ${ProjectName}-codestar-github-connection-arn

  ActivateInstructions:
    Value: >
      Console > Developer Tools > Settings > Connections  PENDING  connection 
      → 'Update pending connection' → GitHub App install  → AVAILABLE 

AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 00 Foundation - IAM (GitHub Actions OIDC Provider + execution Roles for CodePipeline, CodeBuild, Ansible CN, EKS Cluster, ECS Task; one-shot stack, never destroyed)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  GitHubOrg:
    Type: String
    Default: MyosoonHwang
  GitHubRepo:
    Type: String
    Default: BookFlowAI-Platform
  GitHubAppsRepo:
    Type: String
    Default: BookFlowAI-Apps

Resources:
  # ─── GitHub Actions OIDC Provider ( ·  ) ───
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # CFN deploy  `aws configure` IAM User credential  (GHA )
  # GHA  Ansible trigger (SSM SendCommand) 

  # ─── GHA Glue Redeploy Role (SSM Run Command + S3 sync) ───
  GhaGlueRedeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-gha-glue-redeploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: SsmRunCommand
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ec2:DescribeInstances
                Resource: '*'

  # ─── GHA RDS Redeploy Role ( ) ───
  GhaRdsRedeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-gha-rds-redeploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: SsmRunCommand
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ec2:DescribeInstances
                Resource: '*'

  # ─── GHA Publisher Deploy Role (S3 upload + CodeDeploy) ───
  GhaPublisherDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-gha-publisher-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubAppsRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: PublisherDeploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-cp-artifacts-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/publisher/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-cp-artifacts-name
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:GetApplicationRevision
                  - cloudformation:ListExports
                Resource: '*'

  # ─── [ ] CodePipeline Service Role → cicd/codepipeline/*.yaml
  # ─── [ ] CodeBuild Service Role → 
  # ─── [ ] Ansible CN Instance Role → 30-compute-cluster/control-node.yaml
  # ─── [ ] EKS Cluster Role → 30-compute-cluster/eks-cluster.yaml
  # ─── [ ] RDS Enhanced Monitoring Role → 10-data-persistent/rds.yaml
  # ─── [ ] ECS Task Execution Role → 40-compute-runtime/ecs-services.yaml
  # ─── [ ] Lambda Execution Role → 99-serverless/sam-template.yaml (SAM )

Outputs:
  GitHubOidcProviderArn:
    Value: !GetAtt GitHubOidcProvider.Arn
    Export:
      Name: !Sub ${ProjectName}-iam-oidc-provider-arn

  GhaGlueRedeployRoleArn:
    Value: !GetAtt GhaGlueRedeployRole.Arn
    Export:
      Name: !Sub ${ProjectName}-iam-gha-glue-redeploy-role-arn

  GhaRdsRedeployRoleArn:
    Value: !GetAtt GhaRdsRedeployRole.Arn
    Export:
      Name: !Sub ${ProjectName}-iam-gha-rds-redeploy-role-arn

  GhaPublisherDeployRoleArn:
    Value: !GetAtt GhaPublisherDeployRole.Arn
    Export:
      Name: !Sub ${ProjectName}-iam-gha-publisher-deploy-role-arn

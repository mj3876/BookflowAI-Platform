AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 00 - ACM Client VPN server cert skeleton (easy-rsa generated, imported via aws acm import-certificate; ARN stored in Parameter Store)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  ClientVpnServerCertArn:
    Type: String
    Description: easy-rsa   aws acm import-certificate   ARN
    Default: ''  #  . Day 0 cert   aws ssm put-parameter  
  ClientVpnClientCaCertArn:
    Type: String
    Description: Client  CA  ARN
    Default: ''

Conditions:
  HasServerCert: !Not [!Equals [!Ref ClientVpnServerCertArn, '']]
  HasClientCaCert: !Not [!Equals [!Ref ClientVpnClientCaCertArn, '']]

Resources:
  # Parameter Store cert ARN  ( stack )
  ServerCertArnParam:
    Type: AWS::SSM::Parameter
    Condition: HasServerCert
    Properties:
      Name: !Sub /${ProjectName}/acm/client-vpn-server-cert-arn
      Type: String
      Value: !Ref ClientVpnServerCertArn
      Description: Client VPN   ARN (easy-rsa  · ACM import)

  ClientCaCertArnParam:
    Type: AWS::SSM::Parameter
    Condition: HasClientCaCert
    Properties:
      Name: !Sub /${ProjectName}/acm/client-vpn-client-ca-cert-arn
      Type: String
      Value: !Ref ClientVpnClientCaCertArn
      Description: Client VPN  CA  ARN

Outputs:
  ServerCertArn:
    Condition: HasServerCert
    Value: !Ref ClientVpnServerCertArn
    Export:
      Name: !Sub ${ProjectName}-acm-client-vpn-server-arn

  ClientCaCertArn:
    Condition: HasClientCaCert
    Value: !Ref ClientVpnClientCaCertArn
    Export:
      Name: !Sub ${ProjectName}-acm-client-vpn-client-ca-arn

  SetupInstructions:
    Value: >
      easy-rsa server.crt + ca.crt  
      'aws acm import-certificate --certificate file://server.crt --private-key file://server.key --certificate-chain file://ca.crt'
      .  ARN  stack Parameter -deploy.

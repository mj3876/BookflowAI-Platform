AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 00 - S3 Buckets (raw, mart, tf-state, cp-artifacts, glue-scripts, audit optional)

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  AccountSuffix:
    Type: String
    Description: Optional suffix for bucket name uniqueness (e.g. last 4 digits of account)
    Default: ''
  EnableAuditBucket:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable audit bucket (CloudTrail + ObjectLock GOVERNANCE 90d) - set true only when using cloudtrail/cloudwatch

Conditions:
  HasSuffix: !Not [!Equals [!Ref AccountSuffix, '']]
  WithAuditBucket: !Equals [!Ref EnableAuditBucket, 'true']

Resources:
  # Raw data (POS, SNS, Aladin, public API, historical)
  RawBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-raw-${AccountSuffix}', !Sub '${ProjectName}-raw-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: RawToGlacier90d
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90

  # Mart (Glue ETL output)
  MartBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-mart-${AccountSuffix}', !Sub '${ProjectName}-mart-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # EventBridge 알림 활성화: Glue 가 Parquet 파일을 쓸 때마다 EventBridge 로 이벤트 전송
      # sam-template.yaml 의 MartToGcsFn S3EventBridge Rule 이 이 이벤트를 수신
      # S3 → EventBridge → mart-to-gcs Lambda → GCS staging → BigQuery
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # Audit bucket (CloudTrail logs - only when EnableAuditBucket=true)
  AuditBucket:
    Type: AWS::S3::Bucket
    Condition: WithAuditBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-audit-${AccountSuffix}', !Sub '${ProjectName}-audit-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !ImportValue
                Fn::Sub: ${ProjectName}-kms-cloudtrail-arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            # GOVERNANCE: admin can delete before expiry (COMPLIANCE blocks even root for 90d)
            Mode: GOVERNANCE
            Days: 90
      LifecycleConfiguration:
        Rules:
          # Auto-delete after ObjectLock expiry (91d) to avoid stray resources
          - Id: ExpireAuditAfterRetention
            Status: Enabled
            ExpirationInDays: 91
            NoncurrentVersionExpiration:
              NoncurrentDays: 91
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # Bucket policy to allow CloudTrail writes to audit bucket
  AuditBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: WithAuditBucket
    Properties:
      Bucket: !Ref AuditBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub ${AuditBucket.Arn}/AWSLogs/${AWS::AccountId}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # TF State (for AWS-side Terraform backend if needed)
  TfStateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-tf-state-${AccountSuffix}', !Sub '${ProjectName}-tf-state-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CodePipeline Artifacts
  CpArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-cp-artifacts-${AccountSuffix}', !Sub '${ProjectName}-cp-artifacts-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # Glue Scripts (synced by Ansible)
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasSuffix, !Sub '${ProjectName}-glue-scripts-${AccountSuffix}', !Sub '${ProjectName}-glue-scripts-${AWS::AccountId}']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  RawBucketName:
    Value: !Ref RawBucket
    Export:
      Name: !Sub ${ProjectName}-s3-raw-name
  RawBucketArn:
    Value: !GetAtt RawBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-s3-raw-arn

  MartBucketName:
    Value: !Ref MartBucket
    Export:
      Name: !Sub ${ProjectName}-s3-mart-name
  MartBucketArn:
    Value: !GetAtt MartBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-s3-mart-arn

  AuditBucketName:
    Condition: WithAuditBucket
    Value: !Ref AuditBucket
    Export:
      Name: !Sub ${ProjectName}-s3-audit-name
  AuditBucketArn:
    Condition: WithAuditBucket
    Value: !GetAtt AuditBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-s3-audit-arn

  TfStateBucketName:
    Value: !Ref TfStateBucket
    Export:
      Name: !Sub ${ProjectName}-s3-tf-state-name

  CpArtifactsBucketName:
    Value: !Ref CpArtifactsBucket
    Export:
      Name: !Sub ${ProjectName}-s3-cp-artifacts-name

  GlueScriptsBucketName:
    Value: !Ref GlueScriptsBucket
    Export:
      Name: !Sub ${ProjectName}-s3-glue-scripts-name

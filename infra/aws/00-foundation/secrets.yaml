AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 00 - Secrets Manager (skeleton; populated in Phase 2 by Azure Function and Ansible)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  # ─── Entra ID Client Secret (Azure Function → API Gateway → secret-forwarder Lambda ) ───
  EntraClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/auth/entra-client-secret
      Description: Azure Entra ID app registration client secret (rotated every 30d)
      SecretString: '{"placeholder": "to-be-injected-by-secret-forwarder"}'

  # ───  TTB Key ───
  AladinTtbKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/external/aladin-ttbkey
      Description: Aladin Open API TTB key
      SecretString: '{"ttbkey": "REPLACE_ME"}'

  # ───   API Key ───
  PublicDataApiKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/external/publicdata-apikey
      Description: Korea public data portal API key
      SecretString: '{"apikey": "REPLACE_ME"}'

  # ─── RDS Master Password ───
  RdsMasterPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/rds/master-password
      Description: RDS PostgreSQL master password
      GenerateSecretString:
        SecretStringTemplate: '{"username": "bookflow_admin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\ '

  # ─── Glue Connection credentials (BQ) ───
  GlueGcpCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/glue/gcp-sa-key
      Description: GCP Service Account key for Glue Connection to BigQuery
      SecretString: '{"key": "REPLACE_WITH_SA_KEY_JSON"}'

  # ─── SNS/Mock data generator config ───
  SnsGenConfig:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/etl/sns-gen-config
      Description: SNS simulation data generator config
      SecretString: '{"trend_mult": 1.0, "spike_prob": 0.05}'

Outputs:
  EntraClientSecretArn:
    Value: !Ref EntraClientSecret
    Export:
      Name: !Sub ${ProjectName}-secrets-entra-client-arn

  AladinTtbKeyArn:
    Value: !Ref AladinTtbKey
    Export:
      Name: !Sub ${ProjectName}-secrets-aladin-ttbkey-arn

  PublicDataApiKeyArn:
    Value: !Ref PublicDataApiKey
    Export:
      Name: !Sub ${ProjectName}-secrets-publicdata-arn

  RdsMasterPasswordArn:
    Value: !Ref RdsMasterPassword
    Export:
      Name: !Sub ${ProjectName}-secrets-rds-master-arn

  GlueGcpCredentialsArn:
    Value: !Ref GlueGcpCredentials
    Export:
      Name: !Sub ${ProjectName}-secrets-glue-gcp-arn

  SnsGenConfigArn:
    Value: !Ref SnsGenConfig
    Export:
      Name: !Sub ${ProjectName}-secrets-sns-gen-config-arn

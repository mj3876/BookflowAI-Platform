AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 00 - CloudWatch Log Groups + Alarms (retention 7 days)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  # ───  Log Groups (retention 7) ───
  EksLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/eks/${ProjectName}/cluster
      RetentionInDays: 7

  EksContainerInsightsApplication:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/containerinsights/${ProjectName}/application
      RetentionInDays: 7

  EksContainerInsightsDataplane:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/containerinsights/${ProjectName}/dataplane
      RetentionInDays: 7

  LambdaLogGroupAladinSync:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-aladin-sync
      RetentionInDays: 7

  LambdaLogGroupEventSync:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-event-sync
      RetentionInDays: 7

  LambdaLogGroupSnsGen:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-sns-gen
      RetentionInDays: 7

  LambdaLogGroupSpikeDetect:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-spike-detect
      RetentionInDays: 7

  LambdaLogGroupForecastTrigger:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-forecast-trigger
      RetentionInDays: 7

  LambdaLogGroupSecretForwarder:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-secret-forwarder
      RetentionInDays: 7

  # ───  Alarm ( ·     ) ───
  # BOOKFLOW   Azure Logic Apps   → AWS SNS Topic   
  # CloudWatch Alarm → EventBridge Rule → Azure Logic App HTTP trigger 
  # RDS / EKS / Lambda  alarm   stack   (  )

Outputs:
  EksLogGroupName:
    Value: !Ref EksLogGroup
    Export:
      Name: !Sub ${ProjectName}-cw-eks-log-group

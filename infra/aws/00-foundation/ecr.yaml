AWSTemplateFormatVersion: '2010-09-09'
Description: "BOOKFLOW - Tier 00 - ECR Repositories (11 total: 7 EKS Pods + 1 EKS CronJob + 3 ECS Services)"
Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  # ─── EKS Pod  (8) ───
  EcrAuthPod:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}/auth-pod
      ImageScanningConfiguration: { ScanOnPush: true }
      EncryptionConfiguration: { EncryptionType: AES256 }
      LifecyclePolicy:
        LifecyclePolicyText: |
          { "rules": [{ "rulePriority": 1, "description": " 10 ", "selection": { "tagStatus": "any", "countType": "imageCountMoreThan", "countNumber": 10 }, "action": { "type": "expire" } }] }

  EcrDashboardSvc:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}/dashboard-svc
      ImageScanningConfiguration: { ScanOnPush: true }
      EncryptionConfiguration: { EncryptionType: AES256 }
      LifecyclePolicy:

  # Note: Publisher EC2 (Tier 40 publisher-asg)  Ubuntu  nginx/   (UserData) ·
  #       CodeDeploy Blue/Green  S3 zip artifact  → ECR  (V6.2 Slide 22)

Outputs:
  EcrRegistryUri:
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub ${ProjectName}-ecr-registry-uri

  EcrRepoPrefix:
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}
    Export:
      Name: !Sub ${ProjectName}-ecr-repo-prefix

AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 00 - SSM Parameter Store (Standard tier baseline parameters)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stage, prod]

Resources:
  # ───  ───
  RegionParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/config/region
      Type: String
      Value: !Ref AWS::Region

  EnvironmentParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/config/environment
      Type: String
      Value: !Ref Environment

  # ─── VPC CIDR  (4 VPC) ───
  VpcCidrBookflowAi:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/vpc-cidr/bookflow-ai
      Type: String
      Value: 10.0.0.0/16

  VpcCidrSalesData:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/vpc-cidr/sales-data
      Type: String
      Value: 10.1.0.0/16

  VpcCidrEgress:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/vpc-cidr/egress
      Type: String
      Value: 10.2.0.0/16

  VpcCidrData:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/vpc-cidr/data
      Type: String
      Value: 10.3.0.0/16

  VpcCidrAnsible:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/vpc-cidr/ansible
      Type: String
      Value: 10.4.0.0/16

  # ─── TGW BGP ASN (AWS ) ───
  TgwBgpAsn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/tgw-bgp-asn
      Type: String
      Value: '64512'

  # ─── Azure/GCP Customer Gateway IPs ( placeholder · Phase 2  IP ) ───
  AzureVpnGatewayIp:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/azure-vpn-gateway-ip
      Type: String
      Value: 0.0.0.0
      Description: Azure VPN Gateway Public IP (Phase 2  aws ssm put-parameter )

  GcpHaVpnIp:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/network/gcp-ha-vpn-ip
      Type: String
      Value: 0.0.0.0
      Description: GCP HA VPN Peer IP (Phase 2  )

  # ─── EKS   ───
  EksClusterName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/eks/cluster-name
      Type: String
      Value: !Sub ${ProjectName}

  # ─── ECS   ───
  EcsClusterName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/ecs/cluster-name
      Type: String
      Value: !Sub ${ProjectName}

  # ─── GCP Project (·  · Phase 2  ) ───
  GcpProjectId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/gcp/project-id
      Type: String
      Value: REPLACE_WITH_GCP_PROJECT
      Description: GCP Project ID (Phase 2  )

  # ─── Azure Tenant ID ───
  AzureTenantId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/azure/tenant-id
      Type: String
      Value: REPLACE_WITH_TENANT_ID
      Description: Azure Entra ID tenant (Phase 2  )

Outputs:
  ParameterPathPrefix:
    Value: !Sub /${ProjectName}/
    Export:
      Name: !Sub ${ProjectName}-ssm-param-prefix

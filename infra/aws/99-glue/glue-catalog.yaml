AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 99-glue - Glue Database + 6 Jobs (Flex) + IAM + GCS VPN Connection + Data Quality
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  GlueDatabaseName:
    Type: String
    Default: bookflow_mart
  GlueVersion:
    Type: String
    Default: '4.0'
    Description: Glue 4.0 (Spark 3.3 · Python 3.10)
  GcsBucket:
    Type: String
    Default: ''
    Description: GCS staging bucket name for features_build dual-write. Pass by env/deploy parameter.

Resources:
  # ─── Glue Database (Mart  ) ───
  Database:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabaseName
        Description: BOOKFLOW Mart Database (Glue ETL   )
        LocationUri: !Sub
          - s3://${BucketName}/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-mart-name

  # ─── Glue Service Role (S3 + Secrets + CW Logs + Glue Catalog) ───
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-glue-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: glue.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3RawMartAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-raw-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-raw-name
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-mart-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-mart-name
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-glue-scripts-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        - PolicyName: SecretsRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-secrets-glue-gcp-arn
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-secrets-rds-master-arn

  # ─── Glue Connection (NETWORK · bookflow-ai private subnet → TGW → VPN → GCS) ───
  # Glue Worker 가 이 Connection 을 통해 bookflow-ai private subnet 에 ENI 를 얻고
  # RT: 10.50.0.0/24 → TGW → Site-to-Site VPN → GCP PSC → storage.googleapis.com
  GcsVpnConnection:
    Type: AWS::Glue::Connection
    Properties:
      CatalogId: !Ref AWS::AccountId
      ConnectionInput:
        Name: !Sub ${ProjectName}-gcs-vpn
        ConnectionType: NETWORK
        Description: GCS via TGW VPN (bookflow-ai private subnet ENI)
        PhysicalConnectionRequirements:
          SubnetId: !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          SecurityGroupIdList:
            - !ImportValue
              Fn::Sub: ${ProjectName}-lambda-vpc-sg-id
          AvailabilityZone: ap-northeast-1a

  # ─── Glue Jobs × 6 (Flex execution ·  ) ───
  #     yaml 

  # 1. raw_pos_mart
  RawPosMartJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-raw-pos-mart
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/raw_pos_mart.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-enable
        '--RAW_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-raw-name
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 2. raw_sns_mart
  RawSnsMartJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-raw-sns-mart
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/raw_sns_mart.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-enable
        '--RAW_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-raw-name
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 3. raw_aladin_mart
  RawAladinMartJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-raw-aladin-mart
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/raw_aladin_mart.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-enable
        '--RAW_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-raw-name
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 4. raw_event_mart
  RawEventMartJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-raw-event-mart
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/raw_event_mart.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-enable
        '--RAW_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-raw-name
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 5. sales_daily_agg (  )
  SalesDailyAggJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-sales-daily-agg
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/sales_daily_agg.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-enable
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 6. features_build (forecast feature + GCS dual-write via VPN)
  FeaturesBuildJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-features-build
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Connections:
        Connections:
          - !Sub ${ProjectName}-gcs-vpn
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/features_build.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-enable
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
        '--gcp_secret_arn': !ImportValue
          Fn::Sub: ${ProjectName}-secrets-glue-gcp-arn
        '--GCS_BUCKET': !Ref GcsBucket
        '--extra-jars': !Sub
          - s3://${BucketName}/jars/gcs-connector-hadoop3-latest.jar
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--conf': >-
          spark.hadoop.fs.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
          --conf spark.hadoop.fs.AbstractFileSystem.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
      WorkerType: G.1X
      NumberOfWorkers: 4

  # 7. inventory-daily-gcs (S3 mart/inventory_daily → GCS via VPN)
  InventoryDailyGcsJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-inventory-daily-gcs
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Connections:
        Connections:
          - !Sub ${ProjectName}-gcs-vpn
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/mart_table_gcs.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 30
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-disable
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--gcp_secret_arn': !ImportValue
          Fn::Sub: ${ProjectName}-secrets-glue-gcp-arn
        '--GCS_BUCKET': !Ref GcsBucket
        '--TABLE_NAME': inventory_daily
        '--extra-jars': !Sub
          - s3://${BucketName}/jars/gcs-connector-hadoop3-latest.jar
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--conf': >-
          spark.hadoop.fs.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
          --conf spark.hadoop.fs.AbstractFileSystem.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 8. locations-static-gcs (S3 mart/locations_static → GCS via VPN)
  LocationsStaticGcsJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-locations-static-gcs
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Connections:
        Connections:
          - !Sub ${ProjectName}-gcs-vpn
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/mart_table_gcs.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 30
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-disable
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--gcp_secret_arn': !ImportValue
          Fn::Sub: ${ProjectName}-secrets-glue-gcp-arn
        '--GCS_BUCKET': !Ref GcsBucket
        '--TABLE_NAME': locations_static
        '--extra-jars': !Sub
          - s3://${BucketName}/jars/gcs-connector-hadoop3-latest.jar
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--conf': >-
          spark.hadoop.fs.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
          --conf spark.hadoop.fs.AbstractFileSystem.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 9. store-location-map-gcs (S3 mart/store_location_map → GCS via VPN)
  StoreLocationMapGcsJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-store-location-map-gcs
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Connections:
        Connections:
          - !Sub ${ProjectName}-gcs-vpn
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/mart_table_gcs.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty: { MaxConcurrentRuns: 1 }
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 30
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-disable
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--gcp_secret_arn': !ImportValue
          Fn::Sub: ${ProjectName}-secrets-glue-gcp-arn
        '--GCS_BUCKET': !Ref GcsBucket
        '--TABLE_NAME': store_location_map
        '--extra-jars': !Sub
          - s3://${BucketName}/jars/gcs-connector-hadoop3-latest.jar
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--conf': >-
          spark.hadoop.fs.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
          --conf spark.hadoop.fs.AbstractFileSystem.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
      WorkerType: G.1X
      NumberOfWorkers: 2

Outputs:
  GlueDatabaseName:
    Value: !Ref Database
    Export: { Name: !Sub '${ProjectName}-glue-database-name' }
  GlueServiceRoleArn:
    Value: !GetAtt GlueServiceRole.Arn
    Export: { Name: !Sub '${ProjectName}-glue-service-role-arn' }
  GlueServiceRoleName:
    Value: !Ref GlueServiceRole
    Export: { Name: !Sub '${ProjectName}-glue-service-role-name' }
  RawPosMartJobName:
    Value: !Ref RawPosMartJob
    Export: { Name: !Sub '${ProjectName}-glue-job-raw-pos-mart' }
  RawSnsMartJobName:
    Value: !Ref RawSnsMartJob
    Export: { Name: !Sub '${ProjectName}-glue-job-raw-sns-mart' }
  RawAladinMartJobName:
    Value: !Ref RawAladinMartJob
    Export: { Name: !Sub '${ProjectName}-glue-job-raw-aladin-mart' }
  RawEventMartJobName:
    Value: !Ref RawEventMartJob
    Export: { Name: !Sub '${ProjectName}-glue-job-raw-event-mart' }
  SalesDailyAggJobName:
    Value: !Ref SalesDailyAggJob
    Export: { Name: !Sub '${ProjectName}-glue-job-sales-daily-agg' }
  FeaturesBuildJobName:
    Value: !Ref FeaturesBuildJob
    Export: { Name: !Sub '${ProjectName}-glue-job-features-build' }
  GcsVpnConnectionName:
    Value: !Ref GcsVpnConnection
    Export: { Name: !Sub '${ProjectName}-glue-connection-gcs-vpn' }
  InventoryDailyGcsJobName:
    Value: !Ref InventoryDailyGcsJob
    Export: { Name: !Sub '${ProjectName}-glue-job-inventory-daily-gcs' }
  LocationsStaticGcsJobName:
    Value: !Ref LocationsStaticGcsJob
    Export: { Name: !Sub '${ProjectName}-glue-job-locations-static-gcs' }
  StoreLocationMapGcsJobName:
    Value: !Ref StoreLocationMapGcsJob
    Export: { Name: !Sub '${ProjectName}-glue-job-store-location-map-gcs' }

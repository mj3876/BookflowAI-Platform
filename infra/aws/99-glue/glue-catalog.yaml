AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 99-glue - Glue Database + 9 Jobs (Flex) + IAM + GCS VPN Connection + RDS Connection
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  GlueDatabaseName:
    Type: String
    Default: bookflow_mart
  GlueVersion:
    Type: String
    Default: '4.0'
    Description: Glue 4.0 (Spark 3.3 · Python 3.10)
  GcsBucket:
    Type: String
    Default: ''
    Description: GCS staging bucket name for features_build dual-write. Pass by env/deploy parameter.

Resources:
  # ─── Glue Database (Mart  ) ───
  Database:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabaseName
        Description: BOOKFLOW Mart Database (Glue ETL   )
        LocationUri: !Sub
          - s3://${BucketName}/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-mart-name

  # ─── Glue Service Role (S3 + Secrets + CW Logs + Glue Catalog) ───
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-glue-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: glue.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3RawMartAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-raw-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-raw-name
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-mart-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-mart-name
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${BucketName}
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-glue-scripts-name
                  - !Sub
                    - arn:aws:s3:::${BucketName}/*
                    - BucketName: !ImportValue
                        Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        - PolicyName: SecretsRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-secrets-glue-gcp-arn
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-secrets-rds-master-arn

  # ─── Glue VPC Connection SG (self-referencing rule 필수) ───
  # Glue가 ENI 생성 시 "all ingress open" self-ref rule이 없으면 InvalidInputException 발생
  GlueConnectionSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Glue VPC Connection SG (self-referencing required by Glue)
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-bookflow-ai-id
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-glue-connection-sg' }

  GlueConnectionSGSelfRef:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GlueConnectionSG
      IpProtocol: '-1'
      FromPort: -1
      ToPort: -1
      SourceSecurityGroupId: !Ref GlueConnectionSG

  # ─── Glue Connection (NETWORK · bookflow-ai VPC → TGW → data VPC → RDS) ───
  # RDS SG는 10.0.0.0/16(bookflow-ai VPC)만 5432 허용 → Glue ENI를 bookflow-ai 서브넷에 배치
  RdsConnection:
    Type: AWS::Glue::Connection
    Properties:
      CatalogId: !Ref AWS::AccountId
      ConnectionInput:
        Name: !Sub ${ProjectName}-rds
        ConnectionType: NETWORK
        Description: RDS PostgreSQL via bookflow-ai VPC TGW routing
        PhysicalConnectionRequirements:
          SubnetId: !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          SecurityGroupIdList:
            - !GetAtt GlueConnectionSG.GroupId 
            #-!ImportValue Fn::Sub: ${ProjectName}-lambda-vpc-sg-id 수정
          AvailabilityZone: ap-northeast-1a

  # ─── Glue Connection (NETWORK · bookflow-ai private subnet → TGW → VPN → GCS) ───
  # Glue Worker 가 이 Connection 을 통해 bookflow-ai private subnet 에 ENI 를 얻고
  # RT: 10.50.0.0/24 → TGW → Site-to-Site VPN → GCP PSC → storage.googleapis.com
  GcsVpnConnection:
    Type: AWS::Glue::Connection
    Properties:
      CatalogId: !Ref AWS::AccountId
      ConnectionInput:
        Name: !Sub ${ProjectName}-gcs-vpn
        ConnectionType: NETWORK
        Description: GCS via TGW VPN (bookflow-ai private subnet ENI)
        PhysicalConnectionRequirements:
          SubnetId: !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          SecurityGroupIdList:
            - !GetAtt GlueConnectionSG.GroupId
          AvailabilityZone: ap-northeast-1a

  # ─── Glue Jobs × 6 (Flex execution ·  ) ───
  #     yaml 

  # 1. raw_pos_mart
  RawPosMartJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub ${ProjectName}-raw-pos-mart
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${BucketName}/scripts/raw_pos_mart.py
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        PythonVersion: '3'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      ExecutionClass: FLEX
      MaxRetries: 0
      Timeout: 60
      DefaultArguments:
        '--TempDir': !Sub
          - s3://${BucketName}/tmp/
          - BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-glue-scripts-name
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--job-bookmark-option': job-bookmark-disable
        '--RAW_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-raw-name
        '--MART_BUCKET': !ImportValue
          Fn::Sub: ${ProjectName}-s3-mart-name
        '--catalog_database': !Ref Database
      WorkerType: G.1X
      NumberOfWorkers: 2

  # 2. raw_sns_mart
  RawSnsMartJob:

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BOOKFLOW Tier 99-serverless 7 Lambdas + EventBridge cron + Kinesis ESM + API Gateway HTTP

Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  StepFunctionsArn:
    Type: String
    Default: ''
    Description: ETL3 Step Functions ARN. Empty on lambda CREATE-only step; glue task injects it via lambda UPDATE after the step-functions stack exists (lambdas_.py passes this parameter).

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        PROJECT_NAME: !Ref ProjectName
        REGION: !Ref AWS::Region

Resources:
  LambdaVpcSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-lambda-vpc-sg
      GroupDescription: BOOKFLOW VPC Lambda - egress all (RDS via peering bookflow-ai-data)
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-bookflow-ai-id
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: egress all
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-lambda-vpc-sg' }]

  # 1. aladin-sync (cron daily 13:00 KST)
  AladinSyncFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-aladin-sync
      CodeUri: lambdas/aladin-sync/
      Handler: index.lambda_handler
      Environment:
        Variables:
          RAW_BUCKET: !ImportValue
            Fn::Sub: ${ProjectName}-s3-raw-name
      Policies:
        - S3WritePolicy:
            BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-raw-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-secrets-aladin-ttbkey-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'cron(0 4 * * ? *)'
            Enabled: true
            Name: !Sub ${ProjectName}-aladin-sync-cron
            Description: daily 13:00 KST (04:00 UTC)

  # 2. event-sync (cron daily 13:00 KST)
  EventSyncFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-event-sync
      CodeUri: lambdas/event-sync/
      Handler: index.lambda_handler
      Timeout: 120
      Environment:
        Variables:
          RAW_BUCKET: !ImportValue
            Fn::Sub: ${ProjectName}-s3-raw-name
      Policies:
        - S3WritePolicy:
            BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-raw-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-secrets-publicdata-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'cron(0 4 * * ? *)'
            Enabled: true
            Name: !Sub ${ProjectName}-event-sync-cron
            Description: daily 13:00 KST (04:00 UTC)

  # 3. sns-gen (cron 10min)
  SnsGenFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-sns-gen
      CodeUri: lambdas/sns-gen/
      Handler: index.lambda_handler
      Environment:
        Variables:
          RAW_BUCKET: !ImportValue
            Fn::Sub: ${ProjectName}-s3-raw-name
      Policies:
        - S3WritePolicy:
            BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-raw-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-secrets-sns-gen-config-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'rate(10 minutes)'
            Enabled: true
            Name: !Sub ${ProjectName}-sns-gen-cron

  # 4. spike-detect (cron 10min, VPC)
  SpikeDetectFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-spike-detect
      CodeUri: lambdas/spike-detect/
      Handler: index.lambda_handler
      MemorySize: 512
      Timeout: 60
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaVpcSg]
        SubnetIds:
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az2
      Policies:
        - VPCAccessPolicy: {}
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !ImportValue
                    Fn::Sub: ${ProjectName}-secrets-rds-master-arn
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/redis*
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'rate(10 minutes)'
            Enabled: true
            Name: !Sub ${ProjectName}-spike-detect-cron

  # 5. forecast-trigger (cron daily 13:02 KST)
  ForecastTriggerFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-forecast-trigger
      Handler: index.lambda_handler
      InlineCode: |
        import json
        import os
        import boto3
        def lambda_handler(event, context):
            sfn_arn = os.environ.get('STEP_FN_ARN', '')
            if sfn_arn:
                sfn = boto3.client('stepfunctions')
                resp = sfn.start_execution(stateMachineArn=sfn_arn, input=json.dumps({"trigger": "cron"}))
                return {"statusCode": 200, "executionArn": resp['executionArn']}
            return {"statusCode": 200, "body": "STEP_FN_ARN not set"}
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          REGION: !Ref AWS::Region
          STEP_FN_ARN: !Ref StepFunctionsArn
      Policies:
        # SF ARN is empty on lambda CREATE-only step -> use parameter, not ImportValue.
        # Policy uses bookflow-* state machine wildcard -> no step-functions stack dependency.
        - Statement:
            - Effect: Allow
              Action: states:StartExecution
              Resource: !Sub arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${ProjectName}-*
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'cron(2 4 * * ? *)'
            Enabled: true
            Name: !Sub ${ProjectName}-forecast-trigger-cron
            Description: daily 13:02 KST (04:02 UTC)

  # 5b. cost-publisher (Cost Explorer → CloudWatch custom metric, 1h cron)
  CostPublisherFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-cost-publisher
      Handler: index.lambda_handler
      Runtime: python3.13
      Timeout: 60
      InlineCode: |
        """Cost Explorer 데이터 → CloudWatch custom metric (Bookflow/Cost).
        Row 7 cost dashboard 가 이 metric 으로 실제 비용 표시 가능."""
        import boto3, datetime as dt
        ce = boto3.client('ce', region_name='us-east-1')
        cw = boto3.client('cloudwatch')

        def lambda_handler(event, context):
            today = dt.date.today()
            month_start = today.replace(day=1).isoformat()
            yesterday = (today - dt.timedelta(days=1)).isoformat()
            tomorrow = (today + dt.timedelta(days=1)).isoformat()

            # 이번 달 누적 (MonthlyCost)
            r = ce.get_cost_and_usage(
                TimePeriod={'Start': month_start, 'End': tomorrow},
                Granularity='MONTHLY', Metrics=['UnblendedCost'])
            mtd = float(r['ResultsByTime'][0]['Total']['UnblendedCost']['Amount'])

            # 어제 daily (DailyCost)
            r = ce.get_cost_and_usage(
                TimePeriod={'Start': yesterday, 'End': today.isoformat()},
                Granularity='DAILY', Metrics=['UnblendedCost'])
            daily = float(r['ResultsByTime'][0]['Total']['UnblendedCost']['Amount']) if r['ResultsByTime'] else 0

            # service 별 (이번 달)
            r_svc = ce.get_cost_and_usage(
                TimePeriod={'Start': month_start, 'End': tomorrow},
                Granularity='MONTHLY', Metrics=['UnblendedCost'],
                GroupBy=[{'Type': 'DIMENSION', 'Key': 'SERVICE'}])
            svc_metrics = []
            for g in r_svc['ResultsByTime'][0].get('Groups', []):
                svc = g['Keys'][0]
                amt = float(g['Metrics']['UnblendedCost']['Amount'])
                if amt > 0.01:  # 무시할 만한 cost 제외
                    svc_metrics.append({
                        'MetricName': 'EstimatedMonthlyCost',
                        'Dimensions': [{'Name': 'Cloud', 'Value': 'AWS'}, {'Name': 'Service', 'Value': svc[:255]}],
                        'Value': amt, 'Unit': 'None'
                    })

            # publish CloudWatch metrics
            base = [
                {'MetricName': 'EstimatedMonthlyCost', 'Dimensions':[{'Name':'Cloud','Value':'AWS'}], 'Value': mtd, 'Unit':'None'},
                {'MetricName': 'EstimatedDailyCost', 'Dimensions':[{'Name':'Cloud','Value':'AWS'}], 'Value': daily, 'Unit':'None'},
            ]
            cw.put_metric_data(Namespace='Bookflow/Cost', MetricData=base)
            # service 별은 batch (한 번에 최대 20)
            for i in range(0, len(svc_metrics), 20):
                cw.put_metric_data(Namespace='Bookflow/Cost', MetricData=svc_metrics[i:i+20])

            return {'mtd': mtd, 'daily': daily, 'service_count': len(svc_metrics)}
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ce:GetCostAndUsage
                - ce:GetCostForecast
              Resource: '*'
            - Effect: Allow
              Action: cloudwatch:PutMetricData
              Resource: '*'
              Condition:
                StringEquals:
                  cloudwatch:namespace: Bookflow/Cost
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'rate(1 hour)'
            Enabled: true
            Name: !Sub ${ProjectName}-cost-publisher-cron
            Description: Cost Explorer → CW custom metric (Bookflow/Cost) 1h 주기

  # 6. secret-forwarder (API Gateway)
  SecretForwarderFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-secret-forwarder
      Handler: index.lambda_handler
      InlineCode: |
        import json
        def lambda_handler(event, context):
            return {"statusCode": 200, "body": json.dumps({"status": "placeholder"})}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:CreateSecret
                - secretsmanager:UpdateSecret
                - secretsmanager:PutSecretValue
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/auth/*
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-kms-eks-arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /secret
            Method: post
            ApiId: !Ref SecretForwarderApi

  SecretForwarderApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      Tags: { Name: !Sub '${ProjectName}-secret-forwarder-api' }

  # 7. pos-ingestor (Kinesis ESM, VPC)
  PosIngestorFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-pos-ingestor
      CodeUri: lambdas/pos-ingestor/
      Handler: index.lambda_handler
      MemorySize: 512
      Timeout: 60
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaVpcSg]
        SubnetIds:
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az2
      Environment:
        Variables:
          REDIS_HOST: !ImportValue
            Fn::Sub: ${ProjectName}-redis-endpoint
          REDIS_PORT: !ImportValue
            Fn::Sub: ${ProjectName}-redis-port
      Policies:
        - VPCAccessPolicy: {}
        - KinesisStreamReadPolicy:
            StreamName: !ImportValue
              Fn::Sub: ${ProjectName}-kinesis-pos-events-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !ImportValue
                    Fn::Sub: ${ProjectName}-secrets-rds-master-arn
      Events:
        Stream:
          Type: Kinesis
          Properties:
            Stream: !ImportValue
              Fn::Sub: ${ProjectName}-kinesis-pos-events-arn
            BatchSize: 100
            StartingPosition: LATEST
            MaximumBatchingWindowInSeconds: 5
            FunctionResponseTypes: [ReportBatchItemFailures]

  # GCS transfer is handled by the Glue features_build job via GcsVpnConnection.

Outputs:
  AladinSyncArn:
    Value: !GetAtt AladinSyncFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-aladin-sync-arn' }
  EventSyncArn:
    Value: !GetAtt EventSyncFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-event-sync-arn' }
  SnsGenArn:
    Value: !GetAtt SnsGenFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-sns-gen-arn' }
  SpikeDetectArn:
    Value: !GetAtt SpikeDetectFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-spike-detect-arn' }
  ForecastTriggerArn:
    Value: !GetAtt ForecastTriggerFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-forecast-trigger-arn' }
  SecretForwarderArn:
    Value: !GetAtt SecretForwarderFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-secret-forwarder-arn' }
  SecretForwarderApiUrl:
    Value: !Sub 'https://${SecretForwarderApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export: { Name: !Sub '${ProjectName}-secret-forwarder-api-url' }
  PosIngestorArn:
    Value: !GetAtt PosIngestorFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-pos-ingestor-arn' }
  LambdaVpcSgId:
    Value: !Ref LambdaVpcSg
    Export: { Name: !Sub '${ProjectName}-lambda-vpc-sg-id' }

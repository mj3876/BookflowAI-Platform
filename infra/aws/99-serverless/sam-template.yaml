AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BOOKFLOW - Tier 99-serverless - 7 Lambdas + EventBridge cron 5 + Kinesis ESM + API Gateway HTTP
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  StepFunctionsArn:
    Type: String
    Default: ''
    Description: ETL3 Step Functions State Machine ARN - update-stack after Tier 99-glue
  LambdaArtifactBucket:
    Type: String
    Default: ''
    Description: S3 bucket where lambda zip artifacts are uploaded (CodeStar bypass) - leave empty to use InlineCode placeholders
  PosIngestorS3Key:
    Type: String
    Default: lambda/pos-ingestor.zip
    Description: S3 key for pos-ingestor Lambda code zip
  RdsHost:
    Type: String
    Default: ''
    Description: RDS endpoint - bookflow-postgres.xxx.rds.amazonaws.com (empty before Tier 20)
  RedisHost:
    Type: String
    Default: ''
    Description: ElastiCache primary endpoint
  PosIngestorSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for pos_ingestor RDS role - bookflow/rds/pos_ingestor
  SpikeDetectS3Key:
    Type: String
    Default: lambda/spike-detect.zip
    Description: S3 key for spike-detect Lambda code zip
  SpikeDetectSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for spike_detect RDS role - bookflow/rds/spike_detect

Conditions:
  HasStepFn:        !Not [!Equals [!Ref StepFunctionsArn, '']]
  HasArtifact:      !Not [!Equals [!Ref LambdaArtifactBucket, '']]
  HasPosSecret:     !Not [!Equals [!Ref PosIngestorSecretArn, '']]
  HasSpikeSecret:   !Not [!Equals [!Ref SpikeDetectSecretArn, '']]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        PROJECT_NAME: !Ref ProjectName
        REGION: !Ref AWS::Region

Resources:
  # --- Lambda VPC SG (spike-detect - pos-ingestor  - BookFlow AI VPC) ---
  LambdaVpcSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-lambda-vpc-sg
      GroupDescription: BOOKFLOW VPC Lambda - egress all (RDS via peering bookflow-ai-data)
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-bookflow-ai-id
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: egress all
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-lambda-vpc-sg' }]

  # --- 1. aladin-sync (cron daily - S3 Raw write) ---
  AladinSyncFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-aladin-sync
      Handler: index.lambda_handler
      Timeout: 60
      MemorySize: 512
      CodeUri:
        Bucket: !Ref LambdaArtifactBucket
        Key: lambda/aladin-sync.zip
      Policies:
        - S3WritePolicy:
            BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-raw-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-secrets-aladin-ttbkey-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'cron(0 19 * * ? *)'
            Name: !Sub ${ProjectName}-aladin-sync-cron
            Description: daily 04:00 KST (19:00 UTC)

  # --- 2. event-sync (cron daily - S3 Raw write) ---
  EventSyncFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-event-sync
      Handler: index.lambda_handler
      Timeout: 60
      MemorySize: 256
      CodeUri:
        Bucket: !Ref LambdaArtifactBucket
        Key: lambda/event-sync.zip
      Policies:
        - S3WritePolicy:
            BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-raw-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-secrets-publicdata-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'cron(0 18 * * ? *)'
            Name: !Sub ${ProjectName}-event-sync-cron
            Description: daily 03:00 KST (18:00 UTC)

  # --- 3. sns-gen (cron 10min -  ) ---
  SnsGenFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-sns-gen
      Handler: index.lambda_handler
      Timeout: 60
      MemorySize: 256
      CodeUri:
        Bucket: !Ref LambdaArtifactBucket
        Key: lambda/sns-gen.zip
      Policies:
        - S3WritePolicy:
            BucketName: !ImportValue
              Fn::Sub: ${ProjectName}-s3-raw-name
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-secrets-sns-gen-config-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'rate(10 minutes)'
            Name: !Sub ${ProjectName}-sns-gen-cron

  # --- 4. spike-detect (cron 10min - VPC - RDS write - REAL code from S3) ---
  SpikeDetectFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-spike-detect
      Handler: lambda_function.lambda_handler
      MemorySize: 512
      Timeout: 60
      CodeUri:
        Bucket: !Ref LambdaArtifactBucket
        Key: !Ref SpikeDetectS3Key
      Environment:
        Variables:
          RDS_HOST: !Ref RdsHost
          RDS_DB: bookflow
          RDS_USER: spike_detect
          RDS_SECRET_ARN: !Ref SpikeDetectSecretArn
          REDIS_HOST: !Ref RedisHost
          # Phase 3.5 demo (cross-ISBN normalization · 14 ECS sim ISBN 균등 분산):
          # z >= 0.5 means "above-average sales velocity" - visible in dashboard.
          # Phase 4: per-ISBN historic baseline (24h+ rolling) -> z >= 2.0 threshold.
          Z_THRESHOLD: '0.5'
          WINDOW_MINUTES: '60'
          LOG_LEVEL: INFO
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaVpcSg]
        SubnetIds:
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az2
      Policies:
        - VPCAccessPolicy: {}
        - !If
          - HasSpikeSecret
          - Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref SpikeDetectSecretArn
          - Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-secrets-rds-master-arn
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'rate(10 minutes)'
            Name: !Sub ${ProjectName}-spike-detect-cron

  # --- 5. forecast-trigger (cron daily - Step Functions invoke) ---
  ForecastTriggerFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-forecast-trigger
      Handler: index.lambda_handler
      InlineCode: |
        import json
        import os
        import boto3
        def lambda_handler(event, context):
            print(f"[forecast-trigger] placeholder - event={json.dumps(event)}")
            sfn_arn = os.environ.get('STEP_FN_ARN', '')
            if sfn_arn:
                sfn = boto3.client('stepfunctions')
                resp = sfn.start_execution(stateMachineArn=sfn_arn, input=json.dumps({"trigger": "cron"}))
                return {"statusCode": 200, "executionArn": resp['executionArn']}
            return {"statusCode": 200, "body": "STEP_FN_ARN  - placeholder"}
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          REGION: !Ref AWS::Region
          STEP_FN_ARN: !If [HasStepFn, !Ref StepFunctionsArn, '']
      Policies:
        - !If
          - HasStepFn
          - StepFunctionsExecutionPolicy:
              StateMachineName: !Select [6, !Split [':', !Ref StepFunctionsArn]]
          - !Ref AWS::NoValue
      Events:
        Cron:
          Type: Schedule
          Properties:
            Schedule: 'cron(0 19 * * ? *)'
            Name: !Sub ${ProjectName}-forecast-trigger-cron
            Description: daily 04:00 KST (forecast pipeline trigger)

  # --- 6. secret-forwarder (API Gateway - Azure Function ) ---
  SecretForwarderFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-secret-forwarder
      Handler: index.lambda_handler
      InlineCode: |
        import json
        def lambda_handler(event, context):
            print(f"[secret-forwarder] placeholder - event={json.dumps(event)}")
            return {"statusCode": 200, "body": json.dumps({"status": "placeholder"})}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:CreateSecret
                - secretsmanager:UpdateSecret
                - secretsmanager:PutSecretValue
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/auth/*
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !ImportValue
                Fn::Sub: ${ProjectName}-kms-eks-arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /secret
            Method: post
            ApiId: !Ref SecretForwarderApi

  # --- secret-forwarder  HTTP API Gateway ---
  SecretForwarderApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      Tags: { Name: !Sub '${ProjectName}-secret-forwarder-api' }

  # --- 7. pos-ingestor (Kinesis ESM - VPC - RDS write - REAL code from S3) ---
  PosIngestorFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-pos-ingestor
      Handler: lambda_function.lambda_handler
      MemorySize: 512
      Timeout: 60
      # ReservedConcurrentExecutions removed - new account default Lambda limit is too low.
      # SAM transform requires CodeUri literal - !If wrapper breaks it.
      CodeUri:
        Bucket: !Ref LambdaArtifactBucket
        Key: !Ref PosIngestorS3Key
      Environment:
        Variables:
          RDS_HOST: !Ref RdsHost
          RDS_DB: bookflow
          RDS_USER: pos_ingestor
          RDS_SECRET_ARN: !Ref PosIngestorSecretArn
          REDIS_HOST: !Ref RedisHost
          LOG_LEVEL: INFO
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaVpcSg]
        SubnetIds:
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az1
          - !ImportValue
            Fn::Sub: ${ProjectName}-subnet-bookflow-ai-private-az2
      Policies:
        - VPCAccessPolicy: {}
        - KinesisStreamReadPolicy:
            StreamName: !ImportValue
              Fn::Sub: ${ProjectName}-kinesis-pos-events-name
        - !If
          - HasPosSecret
          - Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref PosIngestorSecretArn
          - Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-secrets-rds-master-arn
      Events:
        Stream:
          Type: Kinesis
          Properties:
            Stream: !ImportValue
              Fn::Sub: ${ProjectName}-kinesis-pos-events-arn
            BatchSize: 100
            StartingPosition: LATEST
            MaximumBatchingWindowInSeconds: 5
            FunctionResponseTypes: [ReportBatchItemFailures]

Outputs:
  AladinSyncArn:
    Value: !GetAtt AladinSyncFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-aladin-sync-arn' }
  EventSyncArn:
    Value: !GetAtt EventSyncFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-event-sync-arn' }
  SnsGenArn:
    Value: !GetAtt SnsGenFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-sns-gen-arn' }
  SpikeDetectArn:
    Value: !GetAtt SpikeDetectFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-spike-detect-arn' }
  ForecastTriggerArn:
    Value: !GetAtt ForecastTriggerFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-forecast-trigger-arn' }
  SecretForwarderArn:
    Value: !GetAtt SecretForwarderFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-secret-forwarder-arn' }
  SecretForwarderApiUrl:
    Value: !Sub 'https://${SecretForwarderApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export: { Name: !Sub '${ProjectName}-secret-forwarder-api-url' }
  PosIngestorArn:
    Value: !GetAtt PosIngestorFn.Arn
    Export: { Name: !Sub '${ProjectName}-lambda-pos-ingestor-arn' }
  LambdaVpcSgId:
    Value: !Ref LambdaVpcSg
    Export: { Name: !Sub '${ProjectName}-lambda-vpc-sg-id' }

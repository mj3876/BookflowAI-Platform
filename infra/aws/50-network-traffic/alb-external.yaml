AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 50 - External ALB (Egress VPC Public) + Target Groups (Publisher Blue/Green + inventory-api) + Listeners (HTTP 80 PROD + 8080 TEST)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow

Resources:
  # ─── ALB SG (internet inbound 80/8080 · WAF   ) ───
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-alb-external-sg
      GroupDescription: BOOKFLOW External ALB - inbound 80/8080 from internet (WAF protected)
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-egress-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP prod
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: HTTP test (CodeDeploy Blue/Green test traffic)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: egress all (to targets)
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-alb-external-sg' }]

  # ─── Application Load Balancer (Egress VPC Public · internet-facing) ───
  ExternalAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub ${ProjectName}-alb-external
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets:
        - !ImportValue
          Fn::Sub: ${ProjectName}-subnet-egress-public-az1
        - !ImportValue
          Fn::Sub: ${ProjectName}-subnet-egress-public-az2
      SecurityGroups: [!Ref AlbSecurityGroup]
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-alb-external' }]

  # ─── Publisher Blue Target Group (instance · ASG attach) ───
  PublisherBlueTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-publisher-blue-tg
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-egress-id
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: '200-399' }
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-publisher-blue-tg' }]

  # ─── Publisher Green Target Group (instance · CodeDeploy Blue/Green standby) ───
  PublisherGreenTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-publisher-green-tg
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-egress-id
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: '200-399' }
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-publisher-green-tg' }]

  # ─── Inventory API Target Group (ip · ECS Fargate awsvpc) ───
  InventoryApiTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-inventory-api-tg
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-vpc-egress-id
      Protocol: HTTP
      Port: 8080
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: '200-399' }
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-inventory-api-tg' }]

  # ─── Listener 80 (PROD · default → Publisher Blue) ───
  ListenerProd:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ExternalAlb
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PublisherBlueTg

  # ─── Listener Rule (PROD · /api/inventory/* → inventory-api) ───
  ListenerRuleInventory:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ListenerProd
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: [/api/inventory/*]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref InventoryApiTg

  # ─── Listener 8080 (TEST · CodeDeploy  traffic → Publisher Green) ───
  ListenerTest:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ExternalAlb
      Protocol: HTTP
      Port: 8080
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PublisherGreenTg

Outputs:
  AlbArn:
    Value: !Ref ExternalAlb
    Export: { Name: !Sub '${ProjectName}-alb-external-arn' }
  AlbDnsName:
    Value: !GetAtt ExternalAlb.DNSName
    Export: { Name: !Sub '${ProjectName}-alb-external-dns' }
  AlbHostedZoneId:
    Value: !GetAtt ExternalAlb.CanonicalHostedZoneID
    Export: { Name: !Sub '${ProjectName}-alb-external-hosted-zone-id' }
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export: { Name: !Sub '${ProjectName}-alb-external-sg-id' }
  PublisherBlueTgArn:
    Value: !Ref PublisherBlueTg
    Export: { Name: !Sub '${ProjectName}-publisher-blue-tg-arn' }
  PublisherGreenTgArn:
    Value: !Ref PublisherGreenTg
    Export: { Name: !Sub '${ProjectName}-publisher-green-tg-arn' }
  InventoryApiTgArn:
    Value: !Ref InventoryApiTg
    Export: { Name: !Sub '${ProjectName}-inventory-api-tg-arn' }
  ListenerProdArn:
    Value: !Ref ListenerProd
    Export: { Name: !Sub '${ProjectName}-alb-listener-prod-arn' }
  ListenerTestArn:
    Value: !Ref ListenerTest
    Export: { Name: !Sub '${ProjectName}-alb-listener-test-arn' }

AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 60 - Site-to-Site VPN (Azure + GCP) - TGW Attachment + IPSec Tunnels
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  EnableAzureVpn:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Azure VPN  (Customer Gateway IP   true)
  EnableGcpVpn:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: GCP HA VPN  (Customer Gateway IP   true)
  AzurePresharedKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Azure VPN Tunnel Pre-Shared Key (  AWS   ·    )
  GcpPresharedKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: GCP HA VPN Tunnel Pre-Shared Key (  AWS   ·  vpn_shared_secret  )

Conditions:
  WithAzure: !Equals [!Ref EnableAzureVpn, 'true']
  WithGcp: !Equals [!Ref EnableGcpVpn, 'true']
  WithAzurePsk: !Not [!Equals [!Ref AzurePresharedKey, '']]
  WithGcpPsk: !Not [!Equals [!Ref GcpPresharedKey, '']]

Resources:
  # ─── Azure Site-to-Site VPN Connection ───
  # Azure VPN Gateway Route-Based는 IKEv2 사용 → AWS도 IKEv2로 맞춤
  AzureVpnConnection:
    Type: AWS::EC2::VPNConnection
    Condition: WithAzure
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-cgw-azure-id
      TransitGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-tgw-id
      StaticRoutesOnly: false
      VpnTunnelOptionsSpecifications: !If
        - WithAzurePsk
        - - PreSharedKey: !Ref AzurePresharedKey
            TunnelInsideCidr: 169.254.21.4/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES256
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES256
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
          - PreSharedKey: !Ref AzurePresharedKey
            TunnelInsideCidr: 169.254.21.8/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES256
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES256
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
        - - TunnelInsideCidr: 169.254.21.4/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES256
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES256
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
          - TunnelInsideCidr: 169.254.21.8/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES256
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES256
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpn-azure' }]

  # ─── GCP HA VPN Connection ───
  # IKEv2 필수 (GCP HA VPN은 IKEv2 전용)
  # inside CIDR은 GCP Cloud Router BGP 설정과 반드시 일치해야 함
  GcpVpnConnection:
    Type: AWS::EC2::VPNConnection
    Condition: WithGcp
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-cgw-gcp-id
      TransitGatewayId: !ImportValue
        Fn::Sub: ${ProjectName}-tgw-id
      StaticRoutesOnly: false
      VpnTunnelOptionsSpecifications: !If
        - WithGcpPsk
        - - PreSharedKey: !Ref GcpPresharedKey
            TunnelInsideCidr: 169.254.213.136/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES128
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES128
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
          - PreSharedKey: !Ref GcpPresharedKey
            TunnelInsideCidr: 169.254.100.72/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES128
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES128
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
        - - TunnelInsideCidr: 169.254.213.136/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES128
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES128
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
          - TunnelInsideCidr: 169.254.100.72/30
            IKEVersions:
              - Value: ikev2
            Phase1EncryptionAlgorithms:
              - Value: AES128
            Phase1IntegrityAlgorithms:
              - Value: SHA2-256
            Phase1DHGroupNumbers:
              - Value: 14
            Phase2EncryptionAlgorithms:
              - Value: AES128
            Phase2IntegrityAlgorithms:
              - Value: SHA2-256
            Phase2DHGroupNumbers:
              - Value: 14
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-vpn-gcp' }]

  # VPN Connection  TGW  attach   TGW VPN Attachment 
  #  attachment id  VpnConnectionId   - CFN   GetAtt 
  # → RtPropagation/Association  cross_cloud.py  deploy  boto3  

Outputs:
  AzureVpnConnectionId:
    Condition: WithAzure
    Value: !Ref AzureVpnConnection
    Export: { Name: !Sub '${ProjectName}-vpn-azure-id' }
  GcpVpnConnectionId:
    Condition: WithGcp
    Value: !Ref GcpVpnConnection
    Export: { Name: !Sub '${ProjectName}-vpn-gcp-id' }

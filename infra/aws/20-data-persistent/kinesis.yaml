AWSTemplateFormatVersion: '2010-09-09'
Description: BOOKFLOW - Tier 20 - Kinesis pos-events Data Stream (5 shards) + Firehose to S3 Raw (via VPC endpoint)
Parameters:
  ProjectName:
    Type: String
    Default: bookflow
  # NOTE: Raw bucket name resolved from CFN export `${ProjectName}-s3-raw-name`
  # (s3.yaml stack). Override via Parameter only if you really need to bypass
  # the s3 stack output - leave empty to use the export.
  RawBucketName:
    Type: String
    Default: ''
    Description: >-
      Optional S3 Raw bucket override. Empty -> use ImportValue from s3 stack
      (bookflow-s3-raw-name).
  ShardCount:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 20
  FirehoseBufferSeconds:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 900
  FirehoseBufferMB:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 128

Conditions:
  UseRawBucketOverride: !Not [!Equals [!Ref RawBucketName, '']]

Resources:
  # ─── Kinesis Data Stream (POS   ) ───
  PosEventsStream:
    Type: AWS::Kinesis::Stream
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub ${ProjectName}-pos-events
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: 24
      StreamModeDetails:
        StreamMode: PROVISIONED
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-pos-events' }]

  # ─── Firehose IAM Role (distributed IAM · Kinesis read + S3 write + CW logs) ───
  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-firehose-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: firehose.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: !GetAtt PosEventsStream.Arn
        - PolicyName: S3Write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !If
                    - UseRawBucketOverride
                    - !Sub arn:aws:s3:::${RawBucketName}
                    - !Sub
                      - arn:aws:s3:::${B}
                      - B: !ImportValue
                          Fn::Sub: ${ProjectName}-s3-raw-name
                  - !If
                    - UseRawBucketOverride
                    - !Sub arn:aws:s3:::${RawBucketName}/*
                    - !Sub
                      - arn:aws:s3:::${B}/*
                      - B: !ImportValue
                          Fn::Sub: ${ProjectName}-s3-raw-name
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                  - logs:CreateLogStream
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesisfirehose/${ProjectName}-*:*

  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub /aws/kinesisfirehose/${ProjectName}-pos-events-firehose
      RetentionInDays: 7

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: S3Delivery

  # ─── Firehose Delivery Stream (Kinesis → S3 Raw · partitioned by date) ───
  PosEventsFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DeliveryStreamName: !Sub ${ProjectName}-pos-events-firehose
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt PosEventsStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !If
          - UseRawBucketOverride
          - !Sub arn:aws:s3:::${RawBucketName}
          - !Sub
            - arn:aws:s3:::${B}
            - B: !ImportValue
                Fn::Sub: ${ProjectName}-s3-raw-name
        RoleARN: !GetAtt FirehoseRole.Arn
        Prefix: pos-events/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/
        ErrorOutputPrefix: pos-events-errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/
        BufferingHints:
          IntervalInSeconds: !Ref FirehoseBufferSeconds
          SizeInMBs: !Ref FirehoseBufferMB
        CompressionFormat: GZIP
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream
      Tags: [{ Key: Name, Value: !Sub '${ProjectName}-pos-events-firehose' }]

Outputs:
  StreamName:
    Value: !Ref PosEventsStream
    Export: { Name: !Sub '${ProjectName}-kinesis-pos-events-name' }
  StreamArn:
    Value: !GetAtt PosEventsStream.Arn
    Export: { Name: !Sub '${ProjectName}-kinesis-pos-events-arn' }
  FirehoseName:
    Value: !Ref PosEventsFirehose
    Export: { Name: !Sub '${ProjectName}-firehose-pos-events-name' }
  FirehoseArn:
    Value: !GetAtt PosEventsFirehose.Arn
    Export: { Name: !Sub '${ProjectName}-firehose-pos-events-arn' }

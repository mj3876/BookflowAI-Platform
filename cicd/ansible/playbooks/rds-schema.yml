---
# rds-schema playbook
# Apply 19 tables + 2 views + 28 indexes (sql/001_tables.sql, 002_indexes.sql)
# Idempotent: CREATE TABLE/INDEX IF NOT EXISTS

- name: BookFlow RDS schema apply
  hosts: localhost
  gather_facts: false
  vars:
    aws_region: ap-northeast-1
    project_name: bookflow
    rds_secret_id: bookflow/rds/master-password
    db_port: 5432
    db_name: bookflow
    sql_dir: "{{ playbook_dir }}/../sql"

  tasks:
    - name: Resolve RDS connection
      ansible.builtin.import_role:
        name: postgres-schema

    - name: Read 001_tables.sql
      ansible.builtin.slurp:
        src: "{{ sql_dir }}/001_tables.sql"
      register: tables_sql

    - name: Apply 001_tables.sql (DDL)
      community.postgresql.postgresql_query:
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_master_user }}"
        login_password: "{{ db_master_password }}"
        db: "{{ db_name }}"
        query: "{{ tables_sql.content | b64decode }}"
        autocommit: true
      no_log: true

    - name: Read 002_indexes.sql
      ansible.builtin.slurp:
        src: "{{ sql_dir }}/002_indexes.sql"
      register: indexes_sql

    - name: Apply 002_indexes.sql (indexes)
      community.postgresql.postgresql_query:
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_master_user }}"
        login_password: "{{ db_master_password }}"
        db: "{{ db_name }}"
        query: "{{ indexes_sql.content | b64decode }}"
        autocommit: true
      no_log: true

    # ── Migrations (alphabetical order — 001 → 009 → ...) ───────────────
    # 멱등 패턴 (ADD COLUMN IF NOT EXISTS · pg_constraint 검사 · schema_versions ON CONFLICT)
    # 새 .sql 파일을 cicd/ansible/sql/migrations/ 에 추가하면 자동 픽업.
    - name: List migration files
      ansible.builtin.find:
        paths: "{{ sql_dir }}/migrations"
        patterns: "*.sql"
      register: migration_files

    - name: Read each migration
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      register: migration_contents
      loop: "{{ migration_files.files | sort(attribute='path') }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Apply migrations in order
      community.postgresql.postgresql_query:
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_master_user }}"
        login_password: "{{ db_master_password }}"
        db: "{{ db_name }}"
        query: "{{ item.content | b64decode }}"
        autocommit: true
      loop: "{{ migration_contents.results }}"
      loop_control:
        label: "{{ item.source | basename }}"
      no_log: true

    # base 19 (001_tables.sql) + schema_versions (migrations/001_init.sql 메타테이블)
    # = 최소 20. 향후 migration 이 신규 테이블 추가해도 통과 (drift 잡는 의미는 ">= base"
    # 로 유지). 빠진 base 테이블이 있으면 sub-20 으로 떨어져 fail.
    - name: Verify table count (>= 20 · base 19 + schema_versions)
      community.postgresql.postgresql_query:
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_master_user }}"
        login_password: "{{ db_master_password }}"
        db: "{{ db_name }}"
        query: >-
          SELECT count(*) AS n
          FROM information_schema.tables
          WHERE table_schema = 'public' AND table_type = 'BASE TABLE'
      register: table_count
      no_log: true

    - name: Show table count
      ansible.builtin.debug:
        msg: "Tables in public schema: {{ table_count.query_result[0].n }} (expected >= 20)"

    - name: Fail if table count < 20
      ansible.builtin.fail:
        msg: "Expected >= 20 tables (19 base + schema_versions), got {{ table_count.query_result[0].n }}"
      when: table_count.query_result[0].n | int < 20
